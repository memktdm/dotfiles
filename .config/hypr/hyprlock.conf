# HYPRLOCK - MAIA TURQUOISE THEME

general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
}

background {
    monitor =
    path    = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
}

input-field {
    monitor =
    size = 280, 48
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2
    border_color      = rgba(1abc9cee)
    inner_color       = rgba(20, 24, 30, 0.7)
    font_color        = rgb(ffffff)

    placeholder_text  = <span foreground="##1abc9c"></span> Password...
    hide_input        = false
    rounding          = 14

    fade_on_empty     = true
    capslock_color    = rgba(e74c3cee)
}

label {
    monitor =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(1abc9cff)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign   = center
    valign   = center
}

label {
    monitor =
    text     = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color    = rgba(255, 255, 255, 0.7)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign   = center
    valign   = center
}
